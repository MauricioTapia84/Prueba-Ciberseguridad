services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    container_name: prueba-ciberseguridad-jenkins
    user: root
    group_add:
      - host_docker
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/workspace:rw
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
      - DOCKER_HOST=unix:///var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "curl -sSf http://localhost:8080/login >/dev/null 2>&1"]
      interval: 20s
      timeout: 10s
      retries: 12
      start_period: 20s
    restart: unless-stopped
    networks:
      - devsecops_net

  app-under-test:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prueba-ciberseguridad-app-under-test
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/').getcode() == 200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped
    networks:
      - devsecops_net

  prometheus:
    image: prom/prometheus:latest
    container_name: prueba-ciberseguridad-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - app-under-test
    restart: unless-stopped
    networks:
      - devsecops_net

  grafana:
    image: grafana/grafana:latest
    container_name: prueba-ciberseguridad-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "curl -sSf http://localhost:3000/api/health >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    networks:
      - devsecops_net

  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: prueba-ciberseguridad-zap
    command: zap.sh -daemon -port 8090 -host 0.0.0.0
    ports:
      - "8090:8090"
    volumes:
      - ./reports/zap:/zap/wrk:rw
    depends_on:
      - app-under-test
    restart: unless-stopped
    networks:
      - devsecops_net

volumes:
  jenkins_home:
  grafana_data:

networks:
  devsecops_net:
    driver: bridge
